name: Android CI
on:
  workflow_dispatch:
  push:
    branches: [ "main" ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      # يدوّر على مجلد app_src أياً كان مكانه في المستودع، ويحفظ مساره.
      - name: Locate app_src
        id: loc
        run: |
          SRC=$(find . -type d -name app_src -not -path '*/app/*' | head -n1)
          if [ -z "$SRC" ]; then
            echo "::error::لم يتم العثور على مجلد app_src في المستودع. تأكد من رفع app_src (بداخله lib/ و pubspec.yaml و AndroidManifest.xml)."
            exit 1
          fi
          SRC=$(cd "$SRC" && pwd)
          echo "Found app_src at: $SRC"
          echo "src=$SRC" >> "$GITHUB_OUTPUT"

      - name: Scaffold android project
        run: flutter create --org com.example --project-name quran_splitter --platforms android app

      - name: Overlay source
        run: |
          SRC="${{ steps.loc.outputs.src }}"
          rm -rf app/lib
          cp -rf "$SRC/lib" app/lib
          cp -f "$SRC/pubspec.yaml" app/pubspec.yaml
          cp -f "$SRC/AndroidManifest.xml" app/android/app/src/main/AndroidManifest.xml

      - name: Patch gradle
        run: |
          APP=app/android/app/build.gradle.kts
          if [ -f "$APP" ]; then
            sed -i -E 's/ndkVersion = .*/ndkVersion = "28.2.13676358"/' "$APP"
            sed -i -E 's/compileSdk = .*/compileSdk = 36/' "$APP"
          fi
          ROOT=app/android/build.gradle.kts
          if [ -f "$ROOT" ]; then
            printf 'subprojects {\n    val cfg = {\n        val ext = project.extensions.findByName("android")\n        if (ext != null) {\n            try { ext.javaClass.getMethod("compileSdkVersion", Int::class.javaPrimitiveType).invoke(ext, 36) } catch (e: Exception) {}\n        }\n    }\n    if (state.executed) cfg() else afterEvaluate { cfg() }\n}\n\n' > /tmp/p.kts
            cat "$ROOT" >> /tmp/p.kts && mv /tmp/p.kts "$ROOT"
          fi
          echo "==== ROOT build.gradle.kts (head) ===="
          head -n 14 "$ROOT" || true
          echo "==== APP module sdk lines ===="
          grep -nE "ndkVersion|compileSdk" "$APP" || true

      - name: pub get
        working-directory: app
        run: flutter pub get

      - name: Build APK
        working-directory: app
        # ⬇⬇⬇ بدّل العنوان ده بعنوان سيرفر البايثون بتاعك على Render ⬇⬇⬇
        run: flutter build apk --release --dart-define=API_BASE=https://REPLACE-WITH-YOUR-RENDER-URL.onrender.com

      - uses: actions/upload-artifact@v4
        with:
          name: quran-splitter-apk
          path: app/build/app/outputs/flutter-apk/app-release.apk
