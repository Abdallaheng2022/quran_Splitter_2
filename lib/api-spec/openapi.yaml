openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: account
    description: User account and trial status
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /me:
    get:
      operationId: getMe
      tags: [account]
      summary: Get current user account status
      description: Returns the authenticated user's free-trial status
      responses:
        "200":
          description: Account status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Account"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    Account:
      type: object
      properties:
        id:
          type: string
        email:
          type: string
          nullable: true
        trialsUsed:
          type: integer
        trialsRemaining:
          type: integer
      required:
        - id
        - trialsUsed
        - trialsRemaining
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error
